# Ground truth：pdf_text 清洗的「髒輸入頁 → 期望乾淨行」對照（golden）。
# 輸入模型：pages = list[list[str]]（每頁 pdfplumber extract_text 後 splitlines 的原始行）。
# 期望：clean_lines(pages) == expected_lines。
#
# 覆蓋清洗規則（見 spec §4.1）：
#   R1 刪頁碼行：^-?\s*\d+\s*-?$ / ^第\s*\d+\s*頁$ / ^\d+\s*/\s*\d+$
#   R2 刪重複頁首尾：同一 strip 後文字出現在 >=60% 頁面（且頁數>=3）→ 全數刪除
#       （此處「台新銀行內部文件範例」與「機密」皆 5/5=100% → 刪）
#   R3 CJK 接行：上一行末字不在 {。：；！？} 且下一行非標題 token 且非空 → 併行（無空白）
#       標題 token：^第[..]+條 / ^[一二三..]+、 / ^[（(][一二三..]+[）)] / ^\d+[.、]
#   套用順序：先 R1+R2（逐頁移除雜訊行）→ 再於各頁殘餘行內 R3 接行 → 攤平為單一 list。
#   R3 僅在同頁內接行（不跨頁）。
num_pages: 5
pages:
  - - 台新銀行內部文件範例
    - 第一條 本辦法所稱人工智慧系統指運用機器學
    - 習技術建置之決策輔助系統。
    - "- 1 -"
    - 機密
  - - 台新銀行內部文件範例
    - 第二條 各單位應於導入前完成風險評鑑。
    - "- 2 -"
    - 機密
  - - 台新銀行內部文件範例
    - 前段文字結尾未以句號結束
    - 第三條 本條應獨立成行不得與前行相接。
    - "- 3 -"
    - 機密
  - - 台新銀行內部文件範例
    - 本辦法用詞定義如下：
    - 系統：指人工智慧系統。
    - "- 4 -"
    - 機密
  - - 台新銀行內部文件範例
    - 第四條 本辦法自發布日施行。
    - "- 5 -"
    - 機密
